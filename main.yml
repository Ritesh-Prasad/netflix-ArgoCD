apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-deploy
  labels:
    app: netflix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix
  template:
    metadata:
      labels:
        app: netflix
    spec:
      containers:
      - name: cont1
        image: riteshprasad07/mydockerproject3:latest
        ports:
        - containerPort: 8080  

---
apiVersion: v1
kind: Service
metadata:
  name: service1
spec:
  type: LoadBalancer
  selector:
    app: netflix
  ports:
  - port: 3000        
    targetPort: 8080  
    protocol: TCP
