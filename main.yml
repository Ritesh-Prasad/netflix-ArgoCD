apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: netflix
  name: netflix-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix
  template:
    metadata:
      labels:
        app: netflix
    spec:
      containers:
      - name: cont1
        image: riteshprasad07/mydockerproject3
        ports:
          - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: service1
spec:
  type: LoadBalancer
  selector:
    app: netflix
  ports:
    - port: 3000
